###############################################################################
# Developer Portfolio — Docker Compose (Local Development)
###############################################################################
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services
#   docker compose logs -f        # Follow logs
#   docker compose down -v        # Stop + remove volumes (fresh start)
###############################################################################

services:
  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — Primary Database + pgvector extension
  # ────────────────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: portfolio_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: portfolio_dev
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: portfolio_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - portfolio_network

  # ────────────────────────────────────────────────────────────────────────────
  # Redis — Cache, Queues, Sessions, Reverb Pub/Sub
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - portfolio_network

  # ────────────────────────────────────────────────────────────────────────────
  # Laravel Backend — PHP 8.3 + Octane (Swoole)
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: development
    container_name: portfolio_backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: portfolio_dev
      DB_USERNAME: portfolio_user
      DB_PASSWORD: portfolio_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./backend:/var/www/html:cached
      - /var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio_network

  # ────────────────────────────────────────────────────────────────────────────
  # Laravel Queue Worker
  # ────────────────────────────────────────────────────────────────────────────
  queue:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: development
    container_name: portfolio_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: portfolio_dev
      DB_USERNAME: portfolio_user
      DB_PASSWORD: portfolio_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    volumes:
      - ./backend:/var/www/html:cached
      - /var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - portfolio_network

  # ────────────────────────────────────────────────────────────────────────────
  # Next.js Frontend — Development with HMR
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: development
    container_name: portfolio_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8081
      NEXT_PUBLIC_WS_URL: ws://localhost:6001
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - portfolio_network

  # ────────────────────────────────────────────────────────────────────────────
  # Laravel Reverb — WebSocket Server
  # ────────────────────────────────────────────────────────────────────────────
  reverb:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: development
    container_name: portfolio_reverb
    restart: unless-stopped
    command: php artisan reverb:start --port=6001 --host=0.0.0.0
    ports:
      - "6001:6001"
    environment:
      APP_ENV: local
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./backend:/var/www/html:cached
      - /var/www/html/vendor
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - portfolio_network

  # ────────────────────────────────────────────────────────────────────────────
  # Mailpit — Email Testing (SMTP catcher)
  # ────────────────────────────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: portfolio_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - portfolio_network

# ──────────────────────────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ──────────────────────────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────────────────────────
networks:
  portfolio_network:
    driver: bridge
    name: portfolio_network
