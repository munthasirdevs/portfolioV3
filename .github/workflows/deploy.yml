###############################################################################
# CI/CD — Deploy to Production
###############################################################################

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PHP_VERSION: "8.3"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Pre-deploy Validation
  # ──────────────────────────────────────────────────────────────────────────
  validate:
    name: Pre-deploy Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: echo "version=$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Validate Docker Compose
        run: docker compose config

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy Frontend
  # ──────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}/api/v1
          NEXT_PUBLIC_WS_URL: ${{ secrets.WS_URL }}

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: frontend
        if: github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main'

      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
        if: github.event.inputs.environment == 'staging'

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy Backend
  # ──────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_pgsql, redis, swoole

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-dev

      - name: Copy environment file
        run: cp .env.production.example .env

      - name: Set production environment variables
        run: |
          sed -i "s/APP_KEY=/APP_KEY=${{ secrets.APP_KEY }}/" .env
          sed -i "s/DB_HOST=/DB_HOST=${{ secrets.DB_HOST }}/" .env
          sed -i "s/DB_USERNAME=/DB_USERNAME=${{ secrets.DB_USERNAME }}/" .env
          sed -i "s/DB_PASSWORD=/DB_PASSWORD=${{ secrets.DB_PASSWORD }}/" .env

      - name: Generate application key
        run: php artisan key:generate
        if: ${{ secrets.APP_KEY == '' }}

      - name: Run database migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: 5432
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Optimize Laravel
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /var/www/portfolio/backend
            git pull origin main
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache
            php artisan octane:reload
            echo "Backend deployed successfully"

  # ──────────────────────────────────────────────────────────────────────────
  # Post-deploy Health Check
  # ──────────────────────────────────────────────────────────────────────────
  health-check:
    name: Health Check
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Check Frontend Health
        run: |
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.FRONTEND_URL }})
            if [ "$status" = "200" ]; then
              echo "Frontend is healthy"
              exit 0
            fi
            echo "Attempt $i: Status $status"
            sleep 10
          done
          echo "Frontend health check failed"
          exit 1

      - name: Check Backend Health
        run: |
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.API_URL }}/api/health)
            if [ "$status" = "200" ]; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Attempt $i: Status $status"
            sleep 10
          done
          echo "Backend health check failed"
          exit 1
